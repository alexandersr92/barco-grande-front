# Compose del frontend Next.js para Dokploy.
# Definí NEXT_PUBLIC_STRAPI_URL en la sección Environment de Dokploy con la URL
# pública del backend Strapi (https://...). Se usa en build y en runtime.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Usa la variable de Dokploy si está; si no, cae al valor por defecto
        # (la URL pública del backend). Evita que el build quede sin URL.
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-https://carnes-strapi-ca6779-82-180-133-127.traefik.me}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-https://carnes-strapi-ca6779-82-180-133-127.traefik.me}
    expose:
      - "3000"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
